<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --red: #D94F3D;
    --red-light: #F5E5E3;
    --red-mid: #E8A09A;
    --ink: #1A1A1A;
    --ink-mid: #555;
    --ink-light: #999;
    --bg: #FAFAF8;
    --card: #FFFFFF;
    --border: #E8E5E0;
    --ghost: rgba(217,79,61,0.12);
    --success: #3D8B5E;
    --gold: #C4922A;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    display: flex;
    flex-direction: column;
    line-height: 1.2;
  }

  .logo-main {
    font-size: 28px;
    font-weight: 700;
    color: #8B1A1A;
    letter-spacing: -0.5px;
    font-family: Georgia, 'Times New Roman', serif;
    line-height: 1.1;
  }

  .logo-sub {
    font-size: 11px;
    color: #888;
    letter-spacing: 0.2px;
    font-family: 'Inter', sans-serif;
    font-weight: 400;
  }

  .header-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--ink);
  }

  .header-copyright {
    font-size: 11px;
    color: var(--ink-light);
  }

  /* LESSON SELECTOR */
  .lesson-bar {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .lesson-label {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-mid);
    white-space: nowrap;
  }

  .lesson-chips {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    flex: 1;
  }

  .chip {
    padding: 5px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .chip:hover { border-color: var(--red); color: var(--red); }
  .chip.active {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 28px 20px;
    display: grid;
    grid-template-columns: 1fr 280px;
    gap: 24px;
    align-items: start;
  }

  /* LEFT: WRITING AREA */
  .writing-panel {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 28px;
  }

  /* Word header */
  .word-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
  }

  .word-info {
    display: flex;
    align-items: baseline;
    gap: 10px;
  }

  .word-display {
    font-size: 36px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 700;
    color: var(--ink);
    line-height: 1;
  }

  .word-progress-label {
    font-size: 12px;
    color: var(--ink-light);
  }

  .word-counter {
    font-size: 13px;
    color: var(--ink-mid);
    font-weight: 500;
  }

  /* Char progress bar */
  .char-progress-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .char-pip {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    cursor: default;
  }

  .char-pip-char {
    font-size: 20px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 500;
    transition: color 0.2s;
  }

  .char-pip-dot {
    width: 28px;
    height: 4px;
    border-radius: 2px;
    background: var(--border);
    transition: background 0.2s;
  }

  .char-pip.done .char-pip-char { color: var(--success); }
  .char-pip.done .char-pip-dot { background: var(--success); }
  .char-pip.current .char-pip-char { color: var(--red); }
  .char-pip.current .char-pip-dot { background: var(--red); }
  .char-pip.pending .char-pip-char { color: var(--ink-light); }

  /* Canvas area */
  .canvas-wrapper {
    position: relative;
    display: flex;
    justify-content: center;
    margin-bottom: 20px;
  }

  #hanzi-target {
    border: 2px solid var(--border);
    border-radius: 8px;
    background: #FFFEF9;
    position: relative;
  }

  /* grid lines on canvas */
  .canvas-grid {
    position: absolute;
    top: 0; left: 0;
    pointer-events: none;
  }

  /* Stroke info */
  .stroke-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .stroke-counter {
    font-size: 13px;
    color: var(--ink-mid);
  }

  .stroke-counter span {
    font-weight: 700;
    color: var(--red);
  }

  .accuracy-badge {
    font-size: 12px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 20px;
    background: var(--red-light);
    color: var(--red);
  }

  /* Controls */
  .controls {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    border: 1.5px solid var(--border);
    background: var(--bg);
    color: var(--ink-mid);
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn:hover { border-color: var(--ink-mid); color: var(--ink); }

  .btn.btn-red {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .btn.btn-red:hover { background: #C04434; }

  .btn.btn-ghost {
    background: var(--ghost);
    border-color: var(--red-mid);
    color: var(--red);
  }

  /* RIGHT: SIDEBAR */
  .sidebar {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  /* Result box */
  .result-box {
    background: var(--card);
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    display: none;
  }

  .result-box.show { display: block; }

  .result-emoji {
    font-size: 40px;
    margin-bottom: 10px;
  }

  .result-title {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .result-accuracy {
    font-size: 28px;
    font-weight: 700;
    color: var(--red);
    margin-bottom: 16px;
  }

  .result-actions {
    display: flex;
    gap: 8px;
    justify-content: center;
  }

  /* Word list */
  .wordlist-panel {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .wordlist-header {
    padding: 14px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .wordlist-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
  }

  .wordlist-count {
    font-size: 11px;
    color: var(--ink-light);
    background: var(--border);
    padding: 2px 8px;
    border-radius: 10px;
  }

  .wordlist-body {
    max-height: 420px;
    overflow-y: auto;
  }

  .word-item {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.12s;
    gap: 10px;
  }

  .word-item:last-child { border-bottom: none; }
  .word-item:hover { background: var(--bg); }
  .word-item.active { background: var(--red-light); }

  .word-item-num {
    font-size: 11px;
    color: var(--ink-light);
    width: 22px;
    flex-shrink: 0;
  }

  .word-item-char {
    font-size: 20px;
    font-family: 'Noto Sans SC', sans-serif;
    font-weight: 500;
    flex: 1;
  }

  .word-item-status {
    font-size: 14px;
    flex-shrink: 0;
  }

  /* Stroke order popup */
  .stroke-order-panel {
    background: var(--card);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    padding: 16px;
    display: none;
  }

  .stroke-order-panel.show { display: block; }

  .stroke-order-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-mid);
    margin-bottom: 12px;
  }

  .stroke-order-chars {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .stroke-anim-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .stroke-anim-label {
    font-size: 10px;
    color: var(--ink-light);
  }

  /* feedback flash */
  .wrong-flash {
    animation: wrongFlash 0.3s ease;
  }

  @keyframes wrongFlash {
    0% { background: #FFEBEB; }
    100% { background: #FFFEF9; }
  }

  /* Loading */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(255,254,249,0.85);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    z-index: 10;
  }

  .loading-spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--red);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-light);
  }

  .empty-state-icon { font-size: 40px; margin-bottom: 12px; }
  .empty-state-text { font-size: 14px; }

  /* responsive */
  @media (max-width: 680px) {
    .main { grid-template-columns: 1fr; }
    .sidebar { order: -1; }
    .wordlist-body { max-height: 200px; }
    header { padding: 10px 16px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-main">xiaohanyu</div>
    <div class="logo-sub">© xiaohanyu | Hong Hanh</div>
  </div>
  <div class="header-title">Luyện Viết Từ Vựng</div>
</header>

<div class="lesson-bar">
  <div class="lesson-label">Từ vựng:</div>
  <div class="lesson-chips" id="lessonChips"></div>
</div>

<div class="main">
  <!-- LEFT: Writing -->
  <div class="writing-panel">
    <div id="emptyState" class="empty-state">
      <div class="empty-state-icon">✍️</div>
      <div class="empty-state-text">Chọn bài để bắt đầu luyện viết</div>
    </div>

    <div id="writingArea" style="display:none">
      <div class="word-header">
        <div class="word-info">
          <div class="word-display" id="wordDisplay">—</div>
          <div class="word-progress-label" id="charProgressLabel"></div>
        </div>
        <div class="word-counter" id="wordCounter"></div>
      </div>

      <div class="char-progress-bar" id="charProgressBar"></div>

      <div class="canvas-wrapper">
        <div id="hanzi-target" style="width:260px;height:260px"></div>
        <div id="loadingOverlay" class="loading-overlay" style="display:none">
          <div class="loading-spinner"></div>
        </div>
      </div>

      <div class="stroke-info">
        <div class="stroke-counter">Nét: <span id="strokeCurrent">0</span> / <span id="strokeTotal">0</span></div>
        <div class="accuracy-badge" id="accuracyBadge">Độ chính xác: —</div>
      </div>

      <div class="controls">
        <button class="btn btn-ghost" id="btnToggleGuide">☑ Hiện nét mẫu</button>
        <button class="btn" id="btnStrokeOrder">🔢 Xem thứ tự nét</button>
        <button class="btn" id="btnRedo">↺ Làm lại</button>
        <button class="btn" id="btnPrev">← Từ trước</button>
        <button class="btn btn-red" id="btnNext">Từ tiếp theo →</button>
      </div>
    </div>
  </div>

  <!-- RIGHT: Sidebar -->
  <div class="sidebar">
    <!-- Result box -->
    <div class="result-box" id="resultBox">
      <div class="result-emoji" id="resultEmoji">🎉</div>
      <div class="result-title" id="resultTitle">Hoàn thành từ!</div>
      <div class="result-accuracy" id="resultAccuracy">100%</div>
      <div class="result-actions">
        <button class="btn" onclick="redoCurrentWord()">↺ Viết lại</button>
        <button class="btn btn-red" onclick="nextWord()">Từ tiếp theo →</button>
      </div>
    </div>

    <!-- Stroke order panel -->
    <div class="stroke-order-panel" id="strokeOrderPanel">
      <div class="stroke-order-title">Thứ tự nét: <span id="strokeOrderWord"></span></div>
      <div class="stroke-order-chars" id="strokeOrderChars"></div>
    </div>

    <!-- Word list -->
    <div class="wordlist-panel">
      <div class="wordlist-header">
        <div class="wordlist-title" id="wordlistTitle">Danh sách từ</div>
        <div class="wordlist-count" id="wordlistCount">0 từ</div>
      </div>
      <div class="wordlist-body" id="wordlistBody">
        <div class="empty-state" style="padding: 30px">
          <div class="empty-state-text">Chọn bài để xem từ vựng</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
// ─── VOCABULARY DATA ───────────────────────────────────────────────────────
const LESSONS = {
  "Tất cả": null, // handled separately
  "Bài 1":  ["王","你好","你们","大家","好","学生","老师","您","谢谢","不客气","同学","再见"],
  "Bài 2":  ["请问","你","叫","什么","名字","我","不","是","对不起","没关系","没事","很","高兴","认识","也"],
  "Bài 3":  ["人","的","中国","法国","中文","这","谁","女朋友","哪","国","她","泰国","喂","姐姐","工作","还","忙","吗","对","太","我们","想"],

// ─── STATE ──────────────────────────────────────────────────────────────────
let currentLesson = null;
let currentWords = [];
let currentWordIdx = 0;
let currentCharIdx = 0;
let showGuide = true;
let writers = []; // HanziWriter instances per char in current word
let wordStatus = {}; // idx -> 'done' | 'skip'
let charCorrectStrokes = []; // per char in current word: {correct, total}
let strokeOrderAnimators = {};
let showingStrokeOrder = false;

// ─── INIT ────────────────────────────────────────────────────────────────────
function init() {
  buildLessonChips();
}

function buildLessonChips() {
  const container = document.getElementById('lessonChips');
  const lessonNames = ["Tất cả", ...Object.keys(LESSONS).filter(k => k !== "Tất cả")];
  lessonNames.forEach(name => {
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = name;
    chip.onclick = () => selectLesson(name);
    container.appendChild(chip);
  });
}

function selectLesson(name) {
  // Update chip UI
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  [...document.querySelectorAll('.chip')].find(c => c.textContent === name)?.classList.add('active');

  currentLesson = name;
  if (name === "Tất cả") {
    currentWords = Object.values(LESSONS).filter(Boolean).flat();
  } else {
    currentWords = [...(LESSONS[name] || [])];
  }

  wordStatus = {};
  currentWordIdx = 0;
  
  renderWordList();
  loadWord(0);
}

// ─── WORD LIST ───────────────────────────────────────────────────────────────
function renderWordList() {
  const title = document.getElementById('wordlistTitle');
  const count = document.getElementById('wordlistCount');
  const body = document.getElementById('wordlistBody');

  title.textContent = currentLesson || 'Danh sách từ';
  count.textContent = `${currentWords.length} từ`;

  body.innerHTML = '';
  currentWords.forEach((word, i) => {
    const item = document.createElement('div');
    item.className = 'word-item' + (i === currentWordIdx ? ' active' : '');
    item.id = `word-item-${i}`;
    item.innerHTML = `
      <div class="word-item-num">${i + 1}</div>
      <div class="word-item-char">${word}</div>
      <div class="word-item-status" id="word-status-${i}">○</div>
    `;
    item.onclick = () => loadWord(i);
    body.appendChild(item);
  });
}

function updateWordListStatus(idx, status) {
  const el = document.getElementById(`word-status-${idx}`);
  if (el) el.textContent = status === 'done' ? '✅' : '—';
  wordStatus[idx] = status;
}

function updateWordListActive(idx) {
  document.querySelectorAll('.word-item').forEach(el => el.classList.remove('active'));
  const el = document.getElementById(`word-item-${idx}`);
  if (el) {
    el.classList.add('active');
    el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  }
}

// ─── LOAD WORD ───────────────────────────────────────────────────────────────
function loadWord(idx) {
  if (!currentWords.length) return;
  idx = Math.max(0, Math.min(idx, currentWords.length - 1));
  currentWordIdx = idx;
  currentCharIdx = 0;

  // Reset result box & stroke order
  hideResultBox();
  hideStrokeOrder();

  // Update UI
  const word = currentWords[idx];
  document.getElementById('wordDisplay').textContent = word;
  document.getElementById('wordCounter').textContent = `${idx + 1} / ${currentWords.length}`;
  document.getElementById('writingArea').style.display = 'block';
  document.getElementById('emptyState').style.display = 'none';

  // Char progress
  charCorrectStrokes = word.split('').map(() => ({ correct: 0, total: 0 }));
  buildCharProgress(word);
  updateWordListActive(idx);

  // Load first char
  loadChar(word, 0);
}

function buildCharProgress(word) {
  const bar = document.getElementById('charProgressBar');
  bar.innerHTML = '';
  const chars = word.split('');

  if (chars.length === 1) {
    bar.style.display = 'none';
    return;
  }
  bar.style.display = 'flex';

  chars.forEach((ch, i) => {
    const pip = document.createElement('div');
    pip.className = 'char-pip pending';
    pip.id = `pip-${i}`;
    pip.innerHTML = `
      <div class="char-pip-char">${ch}</div>
      <div class="char-pip-dot"></div>
    `;
    bar.appendChild(pip);
  });

  updateCharProgress();
}

function updateCharProgress() {
  const word = currentWords[currentWordIdx];
  if (!word) return;
  const chars = word.split('');
  chars.forEach((_, i) => {
    const pip = document.getElementById(`pip-${i}`);
    if (!pip) return;
    pip.className = 'char-pip ' + (i < currentCharIdx ? 'done' : i === currentCharIdx ? 'current' : 'pending');
  });
}

// ─── LOAD CHAR ───────────────────────────────────────────────────────────────
function loadChar(word, charIdx) {
  const chars = word.split('');
  const ch = chars[charIdx];
  currentCharIdx = charIdx;

  // Label
  if (chars.length > 1) {
    document.getElementById('charProgressLabel').textContent = `ký tự ${charIdx + 1}/${chars.length}: ${ch}`;
  } else {
    document.getElementById('charProgressLabel').textContent = '';
  }

  updateCharProgress();

  // Destroy old writer
  writers.forEach(w => { try { w.target.innerHTML = ''; } catch(e){} });
  writers = [];

  const target = document.getElementById('hanzi-target');
  target.innerHTML = '';

  // Show loading
  document.getElementById('loadingOverlay').style.display = 'flex';

  // Check if char is Chinese (has strokes)
  const isChinese = /[\u4e00-\u9fff\u3400-\u4dbf]/.test(ch);
  if (!isChinese) {
    // Non-Chinese char (儿 in 面条儿, etc.) — skip
    document.getElementById('loadingOverlay').style.display = 'none';
    document.getElementById('strokeCurrent').textContent = '—';
    document.getElementById('strokeTotal').textContent = '—';
    charCorrectStrokes[charIdx] = { correct: 1, total: 1 };
    // Auto advance
    setTimeout(() => advanceChar(), 300);
    return;
  }

  // Draw grid
  drawGrid(target, 260);

  const writer = HanziWriter.create('hanzi-target', ch, {
    width: 260,
    height: 260,
    padding: 20,
    showOutline: showGuide,
    outlineColor: '#EADDD7',
    strokeColor: '#D94F3D',
    drawingColor: '#1A1A1A',
    drawingWidth: 4,
    strokeWidth: 5,
    highlightColor: '#F5E5E3',
    strokeAnimationSpeed: 1,
    delayBetweenStrokes: 100,
    leniency: 1,
    onLoadCharDataSuccess: function() {
      document.getElementById('loadingOverlay').style.display = 'none';
      updateStrokeCounter(writer, 0);
      startQuiz(writer, charIdx, word);
    },
    onLoadCharDataError: function() {
      document.getElementById('loadingOverlay').style.display = 'none';
      // Character data not found, skip
      charCorrectStrokes[charIdx] = { correct: 1, total: 1 };
      advanceChar();
    }
  });

  writers.push(writer);
}

function drawGrid(container, size) {
  // Grid is drawn via SVG overlay — actual canvas is managed by HanziWriter
  // We insert a grid SVG behind
}

function startQuiz(writer, charIdx, word) {
  let strokeIdx = 0;
  let correctCount = 0;
  
  // Get stroke count via quiz attempt
  let totalStrokes = 0;
  
  writer.quiz({
    onMistake: function(strokeData) {
      totalStrokes = strokeData.totalStrokeCount || totalStrokes;
      flashWrong();
      updateStrokeCounter(writer, strokeIdx, totalStrokes);
    },
    onCorrectStroke: function(strokeData) {
      totalStrokes = strokeData.totalStrokeCount || totalStrokes;
      strokeIdx = strokeData.strokeNum + 1;
      correctCount++;
      updateStrokeCounter(writer, strokeIdx, totalStrokes);
    },
    onComplete: function(summaryData) {
      totalStrokes = summaryData.totalStrokeCount || totalStrokes;
      charCorrectStrokes[charIdx] = {
        correct: summaryData.strokesDrawn - (summaryData.mistakesOnStrokes || 0),
        total: summaryData.strokesDrawn,
        mistakes: summaryData.mistakesOnStrokes || 0
      };
      
      // Small delay, then advance to next char
      setTimeout(() => advanceChar(), 400);
    }
  });
}

function advanceChar() {
  const word = currentWords[currentWordIdx];
  const chars = word.split('').filter(c => /[\u4e00-\u9fff\u3400-\u4dbf\u4e2c]/.test(c) || true);
  const allChars = word.split('');

  if (currentCharIdx + 1 < allChars.length) {
    loadChar(word, currentCharIdx + 1);
  } else {
    // Word complete!
    onWordComplete(word);
  }
}

function onWordComplete(word) {
  // Calculate accuracy
  let totalCorrect = 0, totalStrokes = 0;
  charCorrectStrokes.forEach(s => {
    if (s.total > 0) {
      totalCorrect += Math.max(0, s.total - (s.mistakes || 0));
      totalStrokes += s.total;
    }
  });

  const pct = totalStrokes > 0 ? Math.round((totalCorrect / totalStrokes) * 100) : 100;
  
  updateWordListStatus(currentWordIdx, 'done');
  showResultBox(word, pct);
  
  // Update accuracy badge
  document.getElementById('accuracyBadge').textContent = `Độ chính xác: ${pct}%`;
}

function updateStrokeCounter(writer, current, total) {
  if (total !== undefined) {
    document.getElementById('strokeCurrent').textContent = current;
    document.getElementById('strokeTotal').textContent = total;
  }
}

function flashWrong() {
  const target = document.getElementById('hanzi-target');
  target.classList.remove('wrong-flash');
  void target.offsetWidth; // reflow
  target.classList.add('wrong-flash');
}

// ─── RESULT BOX ──────────────────────────────────────────────────────────────
function showResultBox(word, pct) {
  const box = document.getElementById('resultBox');
  box.classList.add('show');

  const emoji = pct >= 90 ? '🎉' : pct >= 70 ? '👏' : pct >= 50 ? '💪' : '📝';
  const title = pct >= 90 ? 'Xuất sắc!' : pct >= 70 ? 'Tốt lắm!' : pct >= 50 ? 'Cố lên nhé!' : 'Cần luyện thêm!';

  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultAccuracy').textContent = `${pct}%`;
}

function hideResultBox() {
  document.getElementById('resultBox').classList.remove('show');
}

// ─── STROKE ORDER ─────────────────────────────────────────────────────────────
function toggleStrokeOrder() {
  showingStrokeOrder = !showingStrokeOrder;
  const panel = document.getElementById('strokeOrderPanel');
  const btn = document.getElementById('btnStrokeOrder');
  
  if (showingStrokeOrder) {
    panel.classList.add('show');
    btn.textContent = '✕ Đóng thứ tự nét';
    renderStrokeOrder();
  } else {
    hideStrokeOrder();
  }
}

function hideStrokeOrder() {
  showingStrokeOrder = false;
  document.getElementById('strokeOrderPanel').classList.remove('show');
  document.getElementById('btnStrokeOrder').textContent = '🔢 Xem thứ tự nét';
}

function renderStrokeOrder() {
  if (!currentWords.length) return;
  const word = currentWords[currentWordIdx];
  document.getElementById('strokeOrderWord').textContent = word;
  
  const container = document.getElementById('strokeOrderChars');
  container.innerHTML = '';
  
  const chars = word.split('').filter(c => /[\u4e00-\u9fff\u3400-\u4dbf]/.test(c));
  
  chars.forEach(ch => {
    const wrap = document.createElement('div');
    wrap.className = 'stroke-anim-container';
    
    const id = `stroke-anim-${ch}-${Date.now()}`;
    wrap.innerHTML = `
      <div id="${id}" style="width:80px;height:80px;border:1px solid var(--border);border-radius:6px;background:#FFFEF9"></div>
      <div class="stroke-anim-label">${ch}</div>
    `;
    container.appendChild(wrap);
    
    setTimeout(() => {
      const animator = HanziWriter.create(id, ch, {
        width: 80,
        height: 80,
        padding: 5,
        showOutline: true,
        outlineColor: '#E8E5E0',
        strokeColor: '#D94F3D',
        strokeAnimationSpeed: 0.8,
        delayBetweenStrokes: 600,
      });
      animator.loopCharacterAnimation();
    }, 50);
  });
}

// ─── GUIDE TOGGLE ─────────────────────────────────────────────────────────────
function toggleGuide() {
  showGuide = !showGuide;
  const btn = document.getElementById('btnToggleGuide');
  btn.textContent = showGuide ? '☑ Hiện nét mẫu' : '☐ Ẩn nét mẫu';
  btn.className = showGuide ? 'btn btn-ghost' : 'btn';
  
  // Reload current char with new setting
  if (currentWords.length) {
    loadChar(currentWords[currentWordIdx], currentCharIdx);
  }
}

// ─── NAVIGATION ───────────────────────────────────────────────────────────────
function nextWord() {
  hideResultBox();
  if (currentWordIdx + 1 < currentWords.length) {
    loadWord(currentWordIdx + 1);
  }
}

function prevWord() {
  hideResultBox();
  if (currentWordIdx > 0) {
    loadWord(currentWordIdx - 1);
  }
}

function redoCurrentWord() {
  hideResultBox();
  loadWord(currentWordIdx);
}

// ─── BUTTON EVENTS ────────────────────────────────────────────────────────────
document.getElementById('btnToggleGuide').onclick = toggleGuide;
document.getElementById('btnStrokeOrder').onclick = toggleStrokeOrder;
document.getElementById('btnRedo').onclick = redoCurrentWord;
document.getElementById('btnPrev').onclick = prevWord;
document.getElementById('btnNext').onclick = nextWord;

// ─── START ────────────────────────────────────────────────────────────────────
init();
</script>
